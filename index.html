<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Yuvraj Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 id="restaurantName">Hotel Yuvraj</h1>
        <p class="subtitle">Scan, browse, and order easily</p>
      </header>

      <section class="controls">
        <button id="themeToggle" type="button" class="theme-toggle" aria-label="Toggle theme">
          Dark Theme
        </button>
        <label for="categoryFilter" class="sr-only">Filter by category</label>
        <select id="categoryFilter">
          <option value="all">All</option>
          <option value="veg">Veg</option>
          <option value="non-veg">Non-Veg</option>
        </select>
      </section>

      <section id="status" class="status">Loading menu...</section>
      <section id="menuList" class="menu-list"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
