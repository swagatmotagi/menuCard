<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Yuvraj Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <button id="themeToggle" type="button" class="theme-toggle top-right-theme" aria-label="Switch to dark theme" aria-pressed="false">
        ☀️
      </button>

      <header class="header">
        <h1 id="restaurantName">Hotel Yuvraj</h1>
        <p class="subtitle">Scan, browse, and order easily</p>
      </header>

      <section class="controls">
        <div class="filter-toggle" id="menuTypeToggle" role="group" aria-label="Choose menu type">
          <button type="button" class="filter-btn is-active menu-type-btn" data-menu-type="food">Food</button>
          <button type="button" class="filter-btn menu-type-btn" data-menu-type="drinks">Drinks</button>
        </div>
      </section>

      <section class="controls" id="foodFilters">
        <div class="filter-toggle" role="group" aria-label="Filter by category">
          <button type="button" class="filter-btn is-active food-filter-btn" data-food-filter="all">All</button>
          <button type="button" class="filter-btn food-filter-btn" data-food-filter="veg">Veg</button>
          <button type="button" class="filter-btn food-filter-btn" data-food-filter="non-veg">Non-Veg</button>
        </div>
      </section>

      <section class="controls hidden" id="drinkFilters">
        <div class="filter-toggle" role="group" aria-label="Filter drinks">
          <button type="button" class="filter-btn is-active drink-filter-btn" data-drink-filter="all">All</button>
          <button type="button" class="filter-btn drink-filter-btn" data-drink-filter="alcohol">Alcohol</button>
          <button type="button" class="filter-btn drink-filter-btn" data-drink-filter="non-alcoholic">Non-Alcoholic</button>
        </div>
      </section>

      <section id="status" class="status">Loading menu...</section>
      <section class="menu-content" id="menuContent">
        <aside class="drink-section-panel hidden" id="drinkSectionPanel">
          <p class="panel-title">Drink Sections</p>
          <div class="vertical-tabs" id="drinkSectionTabs" role="group" aria-label="Drink section filter"></div>
        </aside>
        <section id="menuList" class="menu-list"></section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
