<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hotel Yuvraj Menu</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1 id="restaurantName">Hotel Yuvraj</h1>
        <p class="subtitle">Scan, browse, and order easily</p>
      </header>

      <section class="controls">
        <button id="themeToggle" type="button" class="theme-toggle" aria-label="Toggle theme" aria-pressed="false">
          Theme: Light
        </button>
        <div class="filter-toggle" role="group" aria-label="Filter by category">
          <button type="button" class="filter-btn is-active" data-filter="all">All</button>
          <button type="button" class="filter-btn" data-filter="veg">Veg</button>
          <button type="button" class="filter-btn" data-filter="non-veg">Non-Veg</button>
        </div>
      </section>

      <section id="status" class="status">Loading menu...</section>
      <section id="menuList" class="menu-list"></section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
